<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ömer faruk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <style>
  html, body {
    height: 100%; margin: 0;
    background: #e5e6e5;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
  }
  .name {
    position: fixed;
    top: 28px; left: 36px;
    font-size: 11px;
    letter-spacing: .22em;
    color: #888;
    text-transform: uppercase;
  }
  .stage {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  /* Interaction Logic */
  .section { cursor: pointer; }
  
  .section path {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), fill-opacity 0.3s, filter 0.3s;
    fill-opacity: 0.9;
    /* Scale from the center of the total logo for a clean 'pop' */
    transform-origin: 187px 187px; 
  }

  .section:hover path {
    fill-opacity: 1;
    filter: drop-shadow(0 0 12px rgba(65, 192, 182, 0.4));
    transform: scale(1.03);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: .22em;
    fill: #444; 
    text-anchor: middle;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    text-transform: uppercase;
  }
  
  .section:hover .section-label { opacity: 1; }

  .center-info {
    font-family: 'Syne', sans-serif;
    fill: #ADA96E;
    pointer-events: none;
    text-transform: uppercase;
  }
</style>

<div class="name">ömer faruk</div>

<div class="stage">
  <svg id="logo" viewBox="40 20 300 340" width="450" height="450" xmlns="http://www.w3.org/2000/svg">
    
    <g class="section" onclick="goTo('blog')">
      <path fill="#41c0b6" d="M 260.02,142.94 L 260.72,143.34 L 328,182.19 L 328,106.24 L 258.4,66.05 L 187.4,25.05 L 118.62,64.77 L 118.62,140.73 L 187.4,101.01 L 260.02,142.94 Z" />
      <text class="section-label" x="220" y="75">blog</text>
    </g>

    <g class="section" onclick="goTo('projects')">
      <path fill="#41c0b6" d="M 260.72,231.52 L 190.42,272.1 L 188.91,272.98 L 121.63,311.83 L 187.4,349.8 L 257.7,309.21 L 328,268.61 L 328,189.17 L 262.23,151.2 L 262.23,230.64 Z" />
      <text class="section-label" x="225" y="305">projects</text>
    </g>

    <g class="section" onclick="goTo('work')">
      <path fill="#41c0b6" d="M 112.57,151.2 L 112.57,68.27 L 46.8,106.24 L 46.8,268.62 L 115.6,308.34 L 149.84,288.56 L 181.36,270.36 L 112.57,230.64 Z" />
      <text class="section-label" x="80" y="195">work</text>
    </g>

    <g class="center-info">
      <text x="187" y="193" text-anchor="middle" font-weight="700" font-size="14" letter-spacing="4">ofaydn</text>
    </g>
  </svg>
</div>

<script>
function goTo(page) { window.location.href = '/' + page + '/'; }
</script>
</body>
</html>
